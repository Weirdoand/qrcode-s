name = "qrcode-s"
main = "src/index.ts"
compatibility_date = "2024-11-06"

workers_dev = true

# Serve the Vite-built SPA from Cloudflare's static assets.
# Anything that doesn't match a route handled by the Worker falls through here.
[assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "qrcode-s-db"
database_id = "ebd37cf5-a43c-42dd-80e4-ddaff74616b4"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "qrcode-s-uploads"

# Public, non-secret config.
[vars]
ALLOWED_ORIGINS = ""
SESSION_TTL = "604800"
GOOGLE_CLIENT_ID = "832989169095-lv2hrll52gjvb2ruu6lc548ug5kie7b8.apps.googleusercontent.com"

# Secrets (set with: `npx wrangler secret put <NAME>`):
#   GOOGLE_CLIENT_SECRET
#   SESSION_SECRET
